services:
  trend-to-commerce:
    build: .
    ports:
      - "${TREND_TO_COMMERCE_PORT:-8000}:8000"
    environment:
      TREND_TO_COMMERCE_DATA_DIR: /app/Data
      TREND_TO_COMMERCE_DB_PATH: /app/storage/trend_to_commerce.db
      GENERATION_API_URL: ${GENERATION_API_URL:-}
      GENERATION_API_KEY: ${GENERATION_API_KEY:-}
      GENERATION_MODEL: ${GENERATION_MODEL:-}
      GENERATION_TIMEOUT_SECONDS: ${GENERATION_TIMEOUT_SECONDS:-45}
      GENERATION_FALLBACK_ON_ERROR: ${GENERATION_FALLBACK_ON_ERROR:-1}
      GENERATION_PREFER_REMOTE: ${GENERATION_PREFER_REMOTE:-1}
      GENERATION_TRANSLATE_WITH_API: ${GENERATION_TRANSLATE_WITH_API:-0}
      GENERATION_TRANSLATION_TIMEOUT_SECONDS: ${GENERATION_TRANSLATION_TIMEOUT_SECONDS:-5}
      TREND_TO_COMMERCE_LOAD_RTF_ENV: ${TREND_TO_COMMERCE_LOAD_RTF_ENV:-0}
    volumes:
      - ./Data:/app/Data:ro
      - trend-to-commerce-storage:/app/storage
    restart: unless-stopped

volumes:
  trend-to-commerce-storage:
